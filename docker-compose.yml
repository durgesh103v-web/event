services:
  mongo:
    image: mongo:7
    container_name: event-management-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: event-management-server
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/event_management
      JWT_SECRET: change-this-secret-before-production
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:8080
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: event-management-client
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  mongo_data:
